# Auto-merge PRs from Dependabot and Renovate for non-breaking dependency bumps
#
# - Patch + minor bumps: auto-approved + auto-merged
# - Major bumps: labeled 'needs-review', no auto-merge
# - Security patches: flagged for fast-track
#
# Requires: 'dependencies' and 'automated' labels exist on the repo
name: Auto-merge Dependencies

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write
  pull-requests: write
  checks: read

jobs:
  classify-and-merge:
    if: ${{ contains(fromJson('["dependabot[bot]", "renovate[bot]"]'), github.actor) }}
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_REPO: ${{ github.repository }}
    steps:
      - name: Fetch Dependabot metadata
        if: ${{ github.actor == 'dependabot[bot]' }}
        id: dependabot-metadata
        uses: dependabot/fetch-metadata@v2
        with:
          alert-lookup: true
          compat-lookup: true

      - name: Label major version bumps for review
        if: ${{ github.actor == 'dependabot[bot]' && steps.dependabot-metadata.outputs.update-type == 'version-update:semver-major' }}
        run: |
          gh pr edit ${{ github.event.pull_request.number }} \
            --add-label "needs-review" \
            --remove-label "automated" 2>/dev/null || true

      - name: Label security patches
        if: ${{ github.actor == 'dependabot[bot]' && steps.dependabot-metadata.outputs.vulnerability-alert-id != '' }}
        run: |
          gh pr edit ${{ github.event.pull_request.number }} \
            --add-label "security" \
            --remove-label "automated" 2>/dev/null || true

      - name: Approve and auto-merge safe bumps
        if: ${{ (github.actor == 'dependabot[bot]' && steps.dependabot-metadata.outputs.update-type != 'version-update:semver-major' && steps.dependabot-metadata.outputs.vulnerability-alert-id == '') || github.actor == 'renovate[bot]' }}
        run: |
          gh pr review --approve ${{ github.event.pull_request.number }}
          gh pr merge --auto --squash ${{ github.event.pull_request.number }}