# Auto-merge Dependabot PRs for non-breaking dependency bumps
#
# - Patch + minor bumps (x.Y.Z-1 -> x.Y.Z): auto-approved + auto-merged
# - Major bumps (X.Y.Z -> X+1.0.0): labeled 'needs-review', no auto-merge
# - Security patches: flagged for fast-track
#
# Requires: Dependabot already configured in .github/dependabot.yml
# Requires: 'dependencies' and 'automated' labels exist on the repo
name: Auto-merge Dependabot

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: write
  pull-requests: write
  checks: read

jobs:
  classify-and-merge:
    if: ${{ github.actor == 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Dependabot metadata
        id: dependabot-metadata
        uses: dependabot/fetch-metadata@v2
        with:
          alert-lookup: true
          compat-lookup: true

      - name: Label major version bumps for review
        if: ${{ steps.dependabot-metadata.outputs.update-type == 'version-update:semver-major' }}
        run: |
          gh pr edit ${{ github.event.pull_request.number }} \
            --add-label "needs-review" \
            --remove-label "automated" 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Label security patches
        if: ${{ steps.dependabot-metadata.outputs.vulnerability-alert-id != '' }}
        run: |
          gh pr edit ${{ github.event.pull_request.number }} \
            --add-label "security" \
            --remove-label "automated" 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge for safe bumps
        # Auto-merge patch and minor bumps (skip major and security)
        if: ${{ steps.dependabot-metadata.outputs.update-type != 'version-update:semver-major' && steps.dependabot-metadata.outputs.vulnerability-alert-id == '' }}
        run: |
          gh pr review --approve ${{ github.event.pull_request.number }}
          gh pr merge --auto --squash ${{ github.event.pull_request.number }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}